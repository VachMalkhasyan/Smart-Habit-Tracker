<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
<div id="app">

    <!-- Header -->
    <div class="header">
        <div class="logo">🎯 Habit Tracker</div>
        <div id="level-badge" class="level-badge">Lv.1</div>
    </div>

    <!-- Not logged in -->
    <!-- Not logged in -->
    <div id="not-logged-in" class="section">
        <p style="font-size:13px; color:#374151; font-weight:600; margin-bottom:12px;">
            Sign in to your account
        </p>

        <div id="login-error" class="error-msg hidden"></div>

        <div class="field">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="you@example.com" class="input" />
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" class="input" />
        </div>
        <button id="btn-login" class="btn btn-primary w-full" style="margin-top:8px;">
            Connect Account
        </button>
    </div>

    <!-- Main content -->
    <div id="main-content" class="hidden">

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="timer">🍅 Timer</button>
            <button class="tab" data-tab="habits">
                ✅ Habits
                <span id="notif-badge" class="notif-tab-badge hidden">0</span>
            </button>
            <button class="tab" data-tab="jobs">💼 Jobs</button>
        </div>

        <!-- Timer tab -->
        <div id="tab-timer" class="tab-content">
            <div class="timer-display">
                <div id="timer-time" class="timer-time">25:00</div>
                <div id="timer-mode" class="timer-mode">Focus time</div>
            </div>

            <div id="sync-banner" class="hidden" style="font-size:11px; color:#4f46e5; text-align:center; padding:4px; margin-bottom:8px; background:#eef2ff; border-radius:6px;">
            </div>

            <div class="timer-controls">
                <button id="btn-reset" class="btn-icon">↩</button>
                <button id="btn-toggle" class="btn btn-primary btn-lg">▶</button>
                <button id="btn-skip"  class="btn-icon">⏭</button>
            </div>

            <div class="sessions-row">
                <span id="session-dots" class="session-dots">○ ○ ○ ○</span>
            </div>

            <div class="setting-row">
                <label>Work</label>
                <input type="number" id="work-min" value="25" min="1" max="120" class="mini-input">
                <label>min &nbsp; Break</label>
                <input type="number" id="break-min" value="5" min="1" max="60" class="mini-input">
                <label>min</label>
            </div>
        </div>

        <!-- Habits tab -->
        <div id="tab-habits" class="tab-content hidden">
            <div id="habits-loading" class="muted text-center">Loading habits...</div>
            <div id="habits-list"></div>
            
            <div id="dashboard-note-container" class="hidden" style="margin-top: 16px; background: #fffcf0; border: 1px solid #fde68a; border-radius: 8px; padding: 12px;">
                <div style="font-size: 13px; font-weight: 600; color: #92400e; margin-bottom: 6px; display: flex; align-items: center; gap: 4px;">
                    📌 Today's Note
                </div>
                <div id="dashboard-note-text" style="font-size: 13px; color: #4b5563; white-space: pre-wrap; word-break: break-word; line-height: 1.5;"></div>
            </div>

            <div class="mt-2">
                <a id="open-app" href="http://localhost:8000/dashboard" target="_blank" class="btn btn-outline w-full" style="margin-top: 12px;">
                    Open Full App →
                </a>
            </div>

            <!-- Notifications Section -->
            <div id="notifications-section" class="hidden" style="margin-top: 16px;">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
                    <div style="font-size:12px; font-weight:700; color:#374151; display:flex; align-items:center; gap:6px;">
                        🔔 Notifications
                        <span id="notif-count-label" style="background:#ef4444; color:#fff; font-size:10px; padding:2px 6px; border-radius:999px;">0</span>
                    </div>
                    <button id="btn-mark-all-read" style="font-size:11px; color:#6366f1; background:none; border:none; cursor:pointer; font-weight:600;">Mark all read</button>
                </div>
                <div id="notif-list" style="display:flex; flex-direction:column; gap:6px;"></div>
            </div>
        </div>

        <!-- Jobs tab -->
        <div id="tab-jobs" class="tab-content hidden">
            <div id="jobs-loading" class="muted text-center">Loading...</div>

            <!-- Stats row -->
            <div id="jobs-stats" class="hidden">
                <div class="stats-row">
                    <span id="jobs-applied">0 Applied</span>
                    <span id="jobs-interviewing">0 Interviews</span>
                    <span id="jobs-offers">0 Offers</span>
                </div>
            </div>

            <!-- Upcoming interviews -->
            <div id="upcoming-interviews"></div>

            <a id="open-jobs" href="http://localhost:8000/jobs"
               target="_blank" class="btn btn-outline w-full mt-2">
                Open Job Tracker →
            </a>
        </div>
    </div>

    <!-- XP bar at bottom -->
    <div id="xp-bar-wrap" class="xp-wrap hidden">
        <div class="xp-label">
            <span id="xp-level">Lv.1</span>
            <span id="xp-text" class="muted">0/100 XP</span>
        </div>
        <div class="xp-track">
            <div id="xp-fill" class="xp-fill" style="width:0%"></div>
        </div>
    </div>
</div>
<script src="popup.js"></script>
</body>
</html>
