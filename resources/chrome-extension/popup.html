<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
<div id="app">

    <!-- Header -->
    <div class="header">
        <div class="logo">🎯 Habit Tracker</div>
        <div id="level-badge" class="level-badge">Lv.1</div>
    </div>

    <!-- Not logged in -->
    <!-- Not logged in -->
    <div id="not-logged-in" class="section">
        <p style="font-size:13px; color:#374151; font-weight:600; margin-bottom:12px;">
            Sign in to your account
        </p>

        <div id="login-error" class="error-msg hidden"></div>

        <div class="field">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="you@example.com" class="input" />
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" class="input" />
        </div>
        <button id="btn-login" class="btn btn-primary w-full" style="margin-top:8px;">
            Connect Account
        </button>
    </div>

    <!-- Main content -->
    <div id="main-content" class="hidden">

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="jobs">💼 Jobs</button>
            <button class="tab" data-tab="habits">
                ✅ Habits
                <span id="notif-badge" class="notif-tab-badge hidden">0</span>
            </button>
        </div>

        <!-- Jobs tab (Scanner included) -->
        <div id="tab-jobs" class="tab-content">
            <div id="scanner-section" style="margin-bottom: 16px; background: #f9fafb; border: 1px dashed #d1d5db; border-radius: 8px; padding: 12px;">
                <div style="font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;">
                    🔍 Job Application Scanner
                </div>
                <p style="font-size:11px; color:#6b7280; margin-bottom:12px;">Scan the current tab for job details (LinkedIn, Indeed, etc.)</p>
                
                <div id="scan-results" class="hidden" style="background:#fff; border:1px solid #e5e7eb; border-radius:6px; padding:10px; margin-bottom:12px;">
                    <div class="field">
                        <label>Company</label>
                        <input type="text" id="scan-company" class="input input-sm" />
                    </div>
                    <div class="field">
                        <label>Role</label>
                        <input type="text" id="scan-role" class="input input-sm" />
                    </div>
                    <div class="field">
                        <label>URL</label>
                        <input type="text" id="scan-url" class="input input-sm" readonly />
                    </div>
                    <button id="btn-save-job" class="btn btn-primary w-full mt-2 btn-sm">Save to GrowthZone</button>
                </div>

                <div id="scan-status" class="hidden muted text-center" style="font-size:11px; margin-bottom:10px;"></div>

                <button id="btn-start-scan" class="btn btn-outline w-full btn-sm">Scan Current Page</button>
            </div>

            <div id="jobs-loading" class="muted text-center">Loading stats...</div>

            <!-- Stats row -->
            <div id="jobs-stats" class="hidden">
                <div class="stats-row" style="margin-bottom:12px;">
                    <span id="jobs-applied">0 Applied</span>
                    <span id="jobs-interviewing">0 Interviews</span>
                    <span id="jobs-offers">0 Offers</span>
                </div>
            </div>

            <!-- Upcoming interviews -->
            <div id="upcoming-interviews"></div>

            <a id="open-jobs" href="http://localhost:8000/jobs"
               target="_blank" class="btn btn-outline w-full mt-2">
                Open Job Tracker →
            </a>
        </div>
    </div>

    <!-- XP bar at bottom -->
    <div id="xp-bar-wrap" class="xp-wrap hidden">
        <div class="xp-label">
            <span id="xp-level">Lv.1</span>
            <span id="xp-text" class="muted">0/100 XP</span>
        </div>
        <div class="xp-track">
            <div id="xp-fill" class="xp-fill" style="width:0%"></div>
        </div>
    </div>
</div>
<script src="popup.js"></script>
</body>
</html>
